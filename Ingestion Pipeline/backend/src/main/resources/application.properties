# ===================================================================
# Core Spring Configuration
# ===================================================================
# This tells Spring Boot to load both application.properties AND application-local.properties
spring.profiles.include=local
# ===================================================================
# Spring Data DataSource Configuration (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/rag
spring.datasource.username=admin
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / Hibernate Cloud Native & Debugging Settings
# ===================================================================
# Automatically create/update database tables based on Java Entity classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console log for easy debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database platform dialect for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect